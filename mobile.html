
<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>營北國中手機登入</title>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/9.22.2/firebase-app-compat.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/9.22.2/firebase-database-compat.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.4/html5-qrcode.min.js"></script>
  <style>
    body { font-family: Arial; padding: 20px; background: #f5f5f5; }
    .container { max-width: 400px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 0 10px rgba(0,0,0,0.1); text-align: center; }
    #message { margin-top: 20px; font-weight: bold; }
    #scanner { width: 100%; margin-top: 20px; }
    #g_id_signin { margin-top: 20px; }
  </style>
</head>
<body>
  <div class="container">
    <h2>手機登入 Google</h2>
    <p>請先掃描桌機的 QR Code</p>
    <div id="scanner"></div>
    <div id="g_id_onload"
         data-client_id="YOUR_GOOGLE_CLIENT_ID"
         data-callback="handleCredentialResponse"
         data-auto_prompt="false"></div>
    <div class="g_id_signin"
         data-type="standard"
         data-size="large"
         data-theme="outline"
         data-text="sign_in_with"
         data-shape="pill"></div>
    <div id="message"></div>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyArF8xncLwA3osSQ_o6yWIyuOc0TMrXRTY",
      authDomain: "yingpei--login.firebaseapp.com",
      databaseURL: "https://yingpei--login-default-rtdb.firebaseio.com",
      projectId: "yingpei--login",
      storageBucket: "yingpei--login.firebasestorage.app",
      messagingSenderId: "261477282402",
      appId: "1:261477282402:web:557f0be058e07cd642173b",
      measurementId: "G-EB9PR17TJL"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    const html5QrCode = new Html5Qrcode("scanner");
    html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 200 }, (decodedText) => {
      localStorage.setItem('lastScannedConnectionId', decodedText);
      html5QrCode.stop();
      document.getElementById('scanner').innerHTML = "<strong>✅ 已掃描 QR Code！</strong>";
    }).catch(err => {
      console.error(err);
      document.getElementById('message').textContent = "無法啟動相機掃描";
    });

    function handleCredentialResponse(response) {
      const token = response.credential;
      const connectionId = localStorage.getItem('lastScannedConnectionId');
      if (!connectionId) {
        showMessage('❌ 尚未掃描 QR Code，請先掃描', 'error');
        return;
      }
      const connectionRef = database.ref('connections/' + connectionId);
      connectionRef.set({
        token: token,
        status: 'token_sent',
        timestamp: Date.now()
      });
      showMessage('✅ 登入成功，已傳送驗證資訊給電腦', 'success');
    }

    function showMessage(msg, type) {
      const el = document.getElementById('message');
      el.textContent = msg;
      el.style.color = type === 'success' ? 'green' : 'red';
    }
  </script>
</body>
</html>
